name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install ruff pyright pytest

      - name: Lint
        run: ruff check quantgpt/ tests/

      - name: Type check
        run: pyright quantgpt/ --level basic

      - name: Test
        env:
          JWT_SECRET_KEY: test-secret-for-ci-only
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
        run: pytest tests/ -x -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
